name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        id: deploy
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /tmp
            rm -rf kopo_cd
            git clone https://github.com/hj1016/kopo_cd.git
            sudo cp /tmp/kopo_cd/index.html /var/www/html/index.html
            sudo systemctl restart nginx

      - name: Notify Teams
        if: always()
        run: |
          if [ "${{ steps.deploy.outcome }}" = "success" ]; then
            COLOR="Good"; EMOJI="✅"; STATUS="배포 성공"; DETAIL="정상 배포되었습니다."
          else
            COLOR="Attention"; EMOJI="❌"; STATUS="배포 실패"; DETAIL="로그를 확인하세요 (아래 버튼)."
          fi
          curl -H "Content-Type: application/json" -d "{
            \"type\": \"message\",
            \"attachments\": [{
              \"contentType\": \"application/vnd.microsoft.card.adaptive\",
              \"content\": {
                \"type\": \"AdaptiveCard\",
                \"version\": \"1.4\",
                \"body\": [
                  { \"type\": \"Container\", \"style\": \"$COLOR\", \"bleed\": true,
                    \"items\": [ { \"type\": \"TextBlock\", \"size\": \"Large\", \"weight\": \"Bolder\", \"text\": \"$EMOJI kopo_cd $STATUS\" } ] },
                  { \"type\": \"FactSet\", \"facts\": [
                      { \"title\": \"상태\", \"value\": \"${{ steps.deploy.outcome }}\" },
                      { \"title\": \"작성자\", \"value\": \"${{ github.actor }}\" },
                      { \"title\": \"커밋\", \"value\": \"${{ github.event.head_commit.message }}\" }
                  ] },
                  { \"type\": \"TextBlock\", \"text\": \"$DETAIL\", \"wrap\": true, \"isSubtle\": true }
                ],
                \"actions\": [
                  { \"type\": \"Action.OpenUrl\", \"title\": \"실행 로그 보기\", \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\" }
                ]
              }
            }]
          }" ${{ secrets.TEAMS_WEBHOOK_URL }}
